name: Good Morning Message

on:
  # Different time each morning (all within 7:00 AM – 9:00 AM WEST)
  # UTC times. Portugal observes WEST (UTC+1) in summer (late Mar – late Oct)
  schedule:
    - cron: '15 6 * * 0'  # Sunday    →  7:15 AM WEST
    - cron: '40 6 * * 1'  # Monday    →  7:40 AM WEST
    - cron: '05 6 * * 2'  # Tuesday   →  7:05 AM WEST
    - cron: '50 6 * * 3'  # Wednesday →  7:50 AM WEST
    - cron: '22 6 * * 4'  # Thursday  →  7:22 AM WEST
    - cron: '38 6 * * 5'  # Friday    →  7:38 AM WEST
    - cron: '55 6 * * 6'  # Saturday  →  7:55 AM WEST
  workflow_dispatch:        # manual trigger for testing

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Restore WhatsApp session
        run: echo "${{ secrets.WWEBJS_SESSION }}" | base64 -d | tar -xzf -
      - name: Send message
        run: node index.js --mode=morning
        env:
          CI: 'true'
