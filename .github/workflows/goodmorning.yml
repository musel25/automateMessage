name: Good Morning Message

on:
  # Different time each morning (all within 7:00 AM – 9:00 AM CST)
  # UTC times. Mexico (Nuevo León) is permanently CST = UTC-6 (no DST since 2022)
  schedule:
    - cron: '15 13 * * 0'  # Sunday    →  7:15 AM CST
    - cron: '40 13 * * 1'  # Monday    →  7:40 AM CST
    - cron: '05 13 * * 2'  # Tuesday   →  7:05 AM CST
    - cron: '50 13 * * 3'  # Wednesday →  7:50 AM CST
    - cron: '22 13 * * 4'  # Thursday  →  7:22 AM CST
    - cron: '38 13 * * 5'  # Friday    →  7:38 AM CST
    - cron: '55 13 * * 6'  # Saturday  →  7:55 AM CST
  workflow_dispatch:        # manual trigger for testing

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Restore WhatsApp session
        run: echo "${{ secrets.WWEBJS_SESSION }}" | base64 -d | tar -xzf -
      - name: Send message
        run: node index.js --mode=morning
        env:
          CI: 'true'
