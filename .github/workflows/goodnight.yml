name: Good Night Message

on:
  # Different time each night (all within 10:30 PM – 12:00 AM WEST)
  # UTC times. Portugal observes WEST (UTC+1) in summer (late Mar – late Oct)
  schedule:
    - cron: '47 21 * * 0'  # Sunday    → 10:47 PM WEST
    - cron: '12 22 * * 1'  # Monday    → 11:12 PM WEST
    - cron: '31 21 * * 2'  # Tuesday   → 10:31 PM WEST
    - cron: '55 21 * * 3'  # Wednesday → 10:55 PM WEST
    - cron: '18 22 * * 4'  # Thursday  → 11:18 PM WEST
    - cron: '38 21 * * 5'  # Friday    → 10:38 PM WEST
    - cron: '03 22 * * 6'  # Saturday  → 11:03 PM WEST
  workflow_dispatch:       # manual trigger for testing

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Restore WhatsApp session
        run: echo "${{ secrets.WWEBJS_SESSION }}" | base64 -d | tar -xzf -
      - name: Send message
        run: node index.js --mode=night
        env:
          CI: 'true'
