name: Good Night Message

on:
  # Different time each night (all within 10:30 PM – 12:30 AM CST/CDT)
  # UTC times. Mexico City: CDT=UTC-5 (Mar-Nov), CST=UTC-6 (Nov-Mar)
  schedule:
    - cron: '47 4 * * 0'  # Sunday    → 11:47 PM CDT / 10:47 PM CST
    - cron: '12 5 * * 1'  # Monday    → 12:12 AM CDT / 11:12 PM CST
    - cron: '31 4 * * 2'  # Tuesday   → 11:31 PM CDT / 10:31 PM CST
    - cron: '55 4 * * 3'  # Wednesday → 11:55 PM CDT / 10:55 PM CST
    - cron: '18 5 * * 4'  # Thursday  → 12:18 AM CDT / 11:18 PM CST
    - cron: '38 4 * * 5'  # Friday    → 11:38 PM CDT / 10:38 PM CST
    - cron: '03 5 * * 6'  # Saturday  → 12:03 AM CDT / 11:03 PM CST
  workflow_dispatch:       # manual trigger for testing

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Restore WhatsApp session
        run: echo "${{ secrets.WWEBJS_SESSION }}" | base64 -d | tar -xzf -
      - name: Send message
        run: node index.js --mode=night
        env:
          CI: 'true'
