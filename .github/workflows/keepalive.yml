name: Keepalive

# GitHub automatically disables scheduled workflows after 60 days with no
# repository activity. That would silently kill the good-morning / good-night
# crons. This workflow commits a timestamp on the 1st of every month so the
# repo never goes idle long enough to be disabled.
on:
  schedule:
    - cron: '0 5 1 * *'  # 1st of each month, 05:00 UTC
  workflow_dispatch:      # manual trigger for testing

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Commit keepalive timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)" || exit 0
          git push
